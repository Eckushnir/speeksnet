<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEEKSNET | Processes & Policies</title>
<style>
  :root {
    --slate-charcoal: #1a1c1e; 
    --sage-professional: #5a8d3b; 
    --text-dark: #2d2d2d; 
    --bg-app: #f4f7f9;
    --idea-gold: #f59e0b;
    --danger-red: #ef4444;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-app); color: var(--text-dark); line-height: 1.6; display: flex; min-height: 100vh; overflow-x: hidden; }
  body.no-scroll { overflow: hidden; }

  /* SIDEBAR STYLES */
  .sidebar { width: 260px; background: var(--slate-charcoal); color: white; position: fixed; top: 0; bottom: 0; left: 0; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; overflow: hidden; }
  .brand-area { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
  .brand-area h1 { font-size: 28px; font-weight: 200; letter-spacing: 6px; margin: 0; color: white; }
  .brand-area .badge { display: inline-block; background: var(--sage-professional); color: white; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 12px; margin-top: 10px; letter-spacing: 1px; text-transform: uppercase; }

  .nav-bar { display: flex; flex-direction: column; gap: 8px; padding: 0 15px; }
  .nav-link { text-decoration: none; color: #a0aab2; padding: 14px 20px; font-weight: 600; font-size: 13px; letter-spacing: 1px; border-radius: 10px; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
  .nav-link:hover { background: rgba(255,255,255,0.05); color: white; transform: translateX(3px); }
  .nav-link.active { background: var(--sage-professional); color: white; }

  /* MAIN CONTENT */
  .main-content { flex-grow: 1; margin-left: 260px; padding: 40px 50px; transition: margin-left 0.3s; }
  .main-content.expanded { margin-left: 76px; }
  
  .page-header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; padding-right: 80px; }
  .header-text h2 { font-size: 28px; font-weight: 800; color: var(--slate-charcoal); letter-spacing: -0.5px; margin: 0; }
  
  .search-container { flex-grow: 1; max-width: 500px; position: relative; }
  .search-input { width: 100%; padding: 16px 20px 16px 45px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; outline: none; }
  .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #aaa; }

  .category-section { margin-bottom: 50px; }
  .category-title { font-size: 16px; font-weight: 800; text-transform: uppercase; color: var(--slate-charcoal); margin-bottom: 20px; border-bottom: 2px solid #eaeaea; padding-bottom: 10px; }
  
  .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
  .doc-card { background: white; border-radius: 12px; padding: 20px; display: flex; align-items: flex-start; gap: 15px; text-decoration: none; border: 1px solid rgba(0,0,0,0.04); transition: all 0.2s; }
  .doc-card:hover { transform: translateY(-3px); border-color: var(--sage-professional); }
  
  .doc-icon { font-size: 28px; background: var(--bg-app); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 10px; flex-shrink: 0; }
  .doc-info { display: flex; flex-direction: column; }
  .doc-title { font-size: 15px; font-weight: 700; color: var(--slate-charcoal); margin-bottom: 4px; }
  .doc-desc { font-size: 12px; color: #888; line-height: 1.4; }

  /* FLOATING ADMIN BUTTON */
  .admin-fab { position: fixed; bottom: 30px; right: 30px; background: var(--slate-charcoal); color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: 0.3s; z-index: 500; cursor: pointer; border: none; display: flex; align-items: center; gap: 10px; }
  .admin-fab:hover { transform: scale(1.05); background: var(--sage-professional); }

  /* ADMIN MODAL STYLES */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; z-index: 9998; }
  .overlay.show { display: block; }
  .admin-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 90%; max-width: 1000px; height: 80vh; border-radius: 20px; z-index: 10000; display: none; flex-direction: column; overflow: hidden; }
  .admin-modal.show { display: flex; }
  
  .modal-header { padding: 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .modal-body { flex-grow: 1; overflow-y: auto; padding: 25px; }
  .modal-footer { padding: 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 15px; }

  .edit-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 50px 50px; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 10px; align-items: center; }
  .edit-row input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  .btn-save { background: var(--sage-professional); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
  .btn-add { background: var(--slate-charcoal); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
  .btn-delete { color: var(--danger-red); background: none; border: none; font-size: 18px; cursor: pointer; }

  .hidden { display: none !important; }
  .empty-state { text-align: center; padding: 50px; color: #888; font-weight: 600; background: white; border-radius: 12px; border: 1px dashed #ccc; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand-area">
    <h1>SPEEKS</h1>
    <div class="badge">KNOWLEDGE BASE</div>
  </div>
  <nav class="nav-bar">
    <a href="index.html" class="nav-link"><i>🏠</i> <span>SPEEKS Hub</span></a>
    <a href="docs.html" class="nav-link active"><i>📚</i> <span>Processes & Policies</span></a>
  </nav>
</aside>

<main class="main-content">
  <div class="page-header">
    <div class="header-text">
      <h2>Processes & Policies</h2>
      <p>Your central library for company guidelines and procedures.</p>
    </div>
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" id="docSearch" class="search-input" placeholder="Search documents..." onkeyup="filterDocs()">
    </div>
  </div>

  <div id="content-container">
      <div class="empty-state">Loading Documents...</div>
  </div>
  <div id="noResults" class="empty-state hidden">No documents found matching your search.</div>
</main>

<button class="admin-fab" onclick="toggleAdminModal()">
    <i>🛠️</i> Manage Policies
</button>

<div id="globalOverlay" class="overlay" onclick="toggleAdminModal()"></div>

<div class="admin-modal" id="adminModal">
    <div class="modal-header">
        <h3>Document Manager</h3>
        <button class="btn-add" onclick="addNewDocRow()">+ Add New Doc</button>
    </div>
    <div class="modal-body" id="adminEditor">
        </div>
    <div class="modal-footer">
        <button onclick="toggleAdminModal()" style="background:none; border:none; cursor:pointer; color:#666;">Cancel</button>
        <button class="btn-save" onclick="saveDocumentsToDisk()">Save Changes</button>
    </div>
</div>

<script>
let allDocsData = []; 

async function loadDocs() {
    try {
        const response = await fetch(`./json/process_documents.json?v=${Date.now()}`);
        allDocsData = await response.json();
        renderDocsUI(allDocsData);
    } catch (e) { 
        console.error("Docs Failed", e); 
        document.getElementById('content-container').innerHTML = '<div class="empty-state">Failed to load documents.</div>'; 
    }
}

function renderDocsUI(docs) {
    const container = document.getElementById('content-container');
    if (!docs || docs.length === 0) {
        container.innerHTML = '<div class="empty-state">No documents found.</div>';
        return;
    }
    
    const groupedDocs = {};
    docs.forEach(doc => {
        let cat = doc.category || "General";
        if (!groupedDocs[cat]) groupedDocs[cat] = [];
        groupedDocs[cat].push(doc);
    });

    let htmlContent = '';
    Object.keys(groupedDocs).sort().forEach(category => {
        htmlContent += `<div class="category-section"><div class="category-title">${category}</div><div class="docs-grid">`;
        groupedDocs[category].forEach(item => {
            htmlContent += `
                <a href="${item.link}" target="_blank" class="doc-card" data-search="${item.title.toLowerCase()} ${item.desc.toLowerCase()} ${category.toLowerCase()}">
                    <div class="doc-icon">${item.icon}</div>
                    <div class="doc-info">
                        <div class="doc-title">${item.title}</div>
                        <div class="doc-desc">${item.desc}</div>
                    </div>
                </a>`;
        });
        htmlContent += `</div></div>`;
    });
    container.innerHTML = htmlContent;
}

function filterDocs() {
    const q = document.getElementById('docSearch').value.toLowerCase();
    document.querySelectorAll('.doc-card').forEach(card => {
        card.classList.toggle('hidden', !card.getAttribute('data-search').includes(q));
    });
}

/* --- ADMIN FUNCTIONS --- */

function toggleAdminModal() {
    const modal = document.getElementById('adminModal');
    const overlay = document.getElementById('globalOverlay');
    const isOpen = modal.classList.contains('show');

    if (!isOpen) {
        renderAdminEditor();
        modal.classList.add('show');
        overlay.classList.add('show');
    } else {
        modal.classList.remove('show');
        overlay.classList.remove('show');
    }
}

function renderAdminEditor() {
    const container = document.getElementById('adminEditor');
    container.innerHTML = '';
    
    allDocsData.forEach((doc, index) => {
        const row = document.createElement('div');
        row.className = 'edit-row';
        row.innerHTML = `
            <input type="text" placeholder="Title" value="${doc.title}" onchange="updateDocData(${index}, 'title', this.value)">
            <input type="text" placeholder="Description" value="${doc.desc}" onchange="updateDocData(${index}, 'desc', this.value)">
            <input type="text" placeholder="Category" value="${doc.category}" onchange="updateDocData(${index}, 'category', this.value)">
            <input type="text" placeholder="Link" value="${doc.link}" onchange="updateDocData(${index}, 'link', this.value)">
            <input type="text" placeholder="Icon" value="${doc.icon}" onchange="updateDocData(${index}, 'icon', this.value)" style="text-align:center;">
            <button class="btn-delete" onclick="removeDoc(${index})">🗑️</button>
        `;
        container.appendChild(row);
    });
}

function updateDocData(index, field, value) {
    allDocsData[index][field] = value;
}

function addNewDocRow() {
    allDocsData.push({ title: "", desc: "", category: "General", link: "", icon: "📄" });
    renderAdminEditor();
}

function removeDoc(index) {
    if(confirm("Are you sure you want to delete this document?")) {
        allDocsData.splice(index, 1);
        renderAdminEditor();
    }
}

async function saveDocumentsToDisk() {
    const saveBtn = document.querySelector('.btn-save');
    saveBtn.innerText = "Saving...";
    saveBtn.disabled = true;

    try {
        const response = await fetch('php/save_process_documents.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(allDocsData)
        });
        
        const result = await response.json();
        if (result.status === 'success') {
            alert("Policies updated successfully!");
            toggleAdminModal();
            renderDocsUI(allDocsData);
        } else {
            alert("Error saving: " + result.message);
        }
    } catch (e) {
        console.error(e);
        alert("Failed to communicate with the server.");
    } finally {
        saveBtn.innerText = "Save Changes";
        saveBtn.disabled = false;
    }
}

document.addEventListener("DOMContentLoaded", loadDocs);
</script>
</body>
</html>
